key: hr
name: "Human Resources"
description: "Manages talent acquisition, employee development, and organizational culture to build and retain a strong team."
roles:
  - title: "HR Director"
    description: "Leads human resources strategy including hiring, retention, culture, and organizational development."
    job_spec: |
      Define HR strategy aligned with company growth plans. Set policies for hiring, performance management, compensation, and employee development.

      Build and maintain company culture through values definition, recognition programs, and team-building initiatives. Monitor employee satisfaction and address concerns.

      Ensure compliance with employment laws and regulations. Manage HR systems and maintain accurate employee records.
    parent: null
    skill_keys:
      - strategic_planning
      - decision_making
      - communication
      - risk_assessment

  - title: "Recruiter"
    description: "Manages the full recruitment lifecycle from sourcing candidates to extending offers and onboarding."
    job_spec: |
      Partner with hiring managers to define role requirements, write job descriptions, and set hiring criteria. Build a pipeline of qualified candidates through sourcing and outreach.

      Screen applications, conduct initial interviews, and coordinate the interview process. Evaluate candidates against defined criteria and provide hiring recommendations.

      Manage offer negotiations and onboarding logistics. Track recruitment metrics: time-to-fill, source effectiveness, and offer acceptance rate.
    parent: "HR Director"
    skill_keys:
      - requirements_gathering
      - communication
      - data_analysis
      - report_writing

  - title: "Training Specialist"
    description: "Designs and delivers training programs to develop employee skills and support career growth."
    job_spec: |
      Assess training needs through skills gap analysis, performance reviews, and manager input. Prioritize training initiatives based on business impact.

      Design training programs: workshops, documentation, mentorship structures, and self-paced learning paths. Create training materials that are clear and engaging.

      Deliver training sessions and measure their effectiveness through assessments and feedback. Track skill development progress and report outcomes to HR leadership.
    parent: "HR Director"
    skill_keys:
      - documentation
      - communication
      - experiment_design
      - progress_reporting

  - title: "Compensation Analyst"
    description: "Researches market compensation data and designs pay structures that attract and retain talent."
    job_spec: |
      Research market compensation data for all company roles. Analyze pay equity across the organization and identify discrepancies.

      Design and maintain compensation structures: salary bands, bonus programs, and equity guidelines. Ensure compensation is competitive and internally equitable.

      Support annual compensation review cycles with data analysis and recommendations. Model the financial impact of proposed compensation changes.
    parent: "HR Director"
    skill_keys:
      - data_analysis
      - financial_analysis
      - market_analysis
      - report_writing
