key: content_strategy
name: Content Strategy
description: Plan and produce written content that serves a defined audience and maps to business goals
category: creative
markdown: |
  # Content Strategy

  ## Purpose
  Decide what content the company produces, for whom, and why — and write it. This skill covers both the planning (editorial calendar, topic selection, positioning) and the production (drafting, editing, packaging for a channel).

  ## When to use
  - A task asks you to plan or draft content: blog posts, landing pages, emails, social posts, long-form pieces
  - An existing content program needs auditing or re-prioritization
  - A campaign requires supporting content assets

  ## Approach
  1. Define the audience and what they already know. A post written for an expert reader looks very different from one for a newcomer
  2. Review existing content via `search_documents` to understand what has already been said and what gaps exist
  3. Map the piece to the buyer journey stage: awareness (educate), consideration (compare), decision (convert). Match tone and depth accordingly
  4. Draft with a single clear takeaway. If the reader remembers one thing, what should it be?
  5. Apply the quality standards: accuracy, useful specificity, plain language, concrete examples, strong opening
  6. Package the piece for the channel: headline, subheads, summary, call to action

  ## Guidelines
  - Prioritize evergreen over topical where possible. Evergreen compounds, topical expires
  - Maintain a consistent voice across channels. Readers notice when content feels disconnected
  - Repurpose strategically. One long-form piece should yield multiple derivative formats
  - Lead with the most important information. Most readers do not reach the end

  ## Deliverable
  The content piece itself (committed to the appropriate location, or posted via `add_message` if a draft is the deliverable), plus a short note listing: intended audience, journey stage, core takeaway, distribution channel, and any supporting assets produced.
