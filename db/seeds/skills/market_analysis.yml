key: market_analysis
name: Market Analysis
description: Assess market size, trends, and competitive dynamics from public data and existing documents, tied to strategic implications
category: research
markdown: |
  # Market Analysis

  ## Purpose
  Produce a grounded view of the market opportunity, competitive landscape, and customer dynamics for a specific decision. The output is not a generic industry overview — it is an analysis targeted at a specific question.

  ## When to use
  - A strategic decision (market entry, pricing, positioning) requires market context
  - A new competitor or market shift needs to be characterized
  - A sizing exercise is required to justify or scope an investment

  ## Approach
  1. Name the market being analyzed: TAM, SAM, and the specific target segment. Bound the scope
  2. Estimate market size using both top-down (industry reports via `search_documents`) and bottom-up (buyer count × deal size) approaches. Triangulate
  3. Identify the 3–5 key trends shaping the market on a relevant horizon: technology shifts, regulatory changes, customer behavior
  4. Map the competitive landscape: direct competitors, indirect alternatives, potential disruptors
  5. Assess differentiation: where does each player win and lose on price, features, distribution?
  6. Tie findings to strategic implications: where is the greatest opportunity and what is the timing window?

  ## Guidelines
  - Cite data sources and note confidence levels. Distinguish verified data from estimates
  - Look for asymmetries where the established wisdom is wrong or outdated
  - Connect findings to specific decisions. A market analysis without implications is just a report
  - Update annually or when a material shift occurs

  ## Deliverable
  A market analysis report posted via `add_message`, containing: executive summary, market sizing with methodology, trend analysis, competitive landscape, differentiation matrix, and strategic implications tied to the originating decision.
