key: regression_testing
name: Regression Testing
description: Verify that existing functionality remains intact after code changes, preventing unintended breakage
category: operations
markdown: |
  # Regression Testing

  ## Purpose
  Confirm that code changes — new features, bug fixes, or refactoring — have not inadvertently broken existing functionality. This skill enables an agent to design and execute regression test suites that catch unintended side effects before they reach users, maintaining product quality as the codebase grows in complexity.

  ## Instructions
  1. Identify the impact area of recent code changes: which features, flows, and integrations could be affected?
  2. Select relevant regression test cases from the master test suite based on the impact analysis
  3. Prioritize test execution: critical user flows and recently changed areas first, then full regression sweep
  4. Execute tests against the build being released; record pass/fail status for every test case
  5. Investigate failures: determine whether the failure is caused by the change (a regression) or a pre-existing defect
  6. Block release on regressions; document pre-existing defects separately with a severity and resolution plan

  ## Guidelines
  - Automate the stable, high-value regression tests; manual regression effort should focus on new and risky areas
  - Update the regression suite when existing features change — stale tests that always pass provide false confidence
  - Define a regression risk score for each release based on change volume and blast radius
  - Never skip regression testing due to time pressure; negotiate scope, not quality

  ## Output Format
  Regression test report with: change summary and impact analysis, test cases executed (pass/fail), regressions found (description, severity, linked code change), pre-existing defects noted, overall release quality assessment (go/no-go recommendation), and deferred issues with owners.
