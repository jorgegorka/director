key: progress_reporting
name: Progress Reporting
description: Produce clear, accurate status reports that keep stakeholders informed and enable timely decisions
category: operations
markdown: |
  # Progress Reporting

  ## Purpose
  Communicate project and team progress in a format that gives stakeholders the information they need to make decisions and maintain confidence in delivery. This skill enables an agent to synthesize status across workstreams, surface risks proactively, and produce reports calibrated to each audience's level of detail preference.

  ## Instructions
  1. Define reporting cadence and audience: who receives this report, how often, and what decisions does it support?
  2. Gather status from task tracking systems, team members, and milestone completion data
  3. Assess overall health using a simple RAG (Red/Amber/Green) framework for scope, schedule, and budget
  4. Summarize key accomplishments since the last report; quantify progress where possible
  5. Identify risks, issues, and decisions needed from the audience; be explicit about what's asked of them
  6. Forecast the next period: what will be completed and what might slip?

  ## Guidelines
  - Lead with exceptions — stakeholders need to know about problems, not just that everything is fine
  - Be accurate even when the news is bad; delayed bad news is always more expensive than timely bad news
  - Distinguish facts from estimates and clearly label predictions as such
  - Keep executive summaries to one page; details go in appendices for those who need them

  ## Output Format
  Progress report with: executive summary (RAG status, headline accomplishments, headline risks), accomplishments since last report, upcoming milestones, risks and issues log (with owner and resolution date), decisions needed, and a health trend over the last three reporting periods.
