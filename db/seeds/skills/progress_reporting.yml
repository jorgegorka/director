key: progress_reporting
name: Progress Reporting
description: Produce concise upward status updates that surface risks, name decisions needed, and forecast the next period
category: operations
markdown: |
  # Progress Reporting

  ## Purpose
  Summarize the state of the work you own for an audience one level up: accomplishments, risks, decisions needed, and forecast. The report must be short enough to be read in full and specific enough to be acted on.

  ## When to use
  - Your manager has asked for a status update
  - A reporting cadence has arrived (weekly, per-milestone) and an update is due
  - A material change in scope, schedule, or risk needs to be communicated upward

  ## Approach
  1. Read your current tasks and goals via `list_my_tasks` and `list_my_tasks`, plus any reportee status messages via `get_task_details`
  2. Assess overall health using a simple RAG rating (Red / Amber / Green) for scope, schedule, and risk
  3. Summarize accomplishments since the last report. Quantify where possible
  4. Identify risks, issues, and explicitly name any decisions you need from your manager
  5. Forecast the next period: what will be completed, what might slip
  6. Keep the executive summary to 5–10 lines. Details go below for the reader who wants them

  ## Guidelines
  - Lead with exceptions. The reader needs to know about problems, not that everything is fine
  - Be accurate even when the news is bad. Delayed bad news is always more expensive than timely bad news
  - Distinguish facts from estimates. Label predictions as such
  - If you need a decision, ask for it explicitly — do not bury the ask in the middle of a paragraph

  ## Deliverable
  A status report posted via `add_message` on the relevant goal or parent task, containing: RAG summary, accomplishments, upcoming milestones, risks and issues (with owners and ETAs), decisions needed, and the health trend.
