key: budget_planning
name: Budget Planning
description: Produce an operating budget that allocates resources to priorities and names trade-offs explicitly
category: operations
markdown: |
  # Budget Planning

  ## Purpose
  Translate strategic priorities into a concrete allocation of spending by category, department, and time period. A good budget is a ranked list of what the company will fund, what it will not, and why — not a spreadsheet of last year's numbers nudged by a percentage.

  ## When to use
  - An annual or quarterly planning cycle has begun
  - A material change in strategy or revenue requires re-allocating spend
  - A reportee is requesting funding and you need to fit it against the broader envelope

  ## Approach
  1. Read prior-period actuals and identify variances between plan and reality via `search_documents` if finance docs exist. Understand the causes
  2. Read the current strategic goals (`list_my_goals`, `get_goal_details`) and translate them into resource requirements
  3. Apply zero-based thinking per category: what is the minimum required to achieve the goal versus what is nice to have?
  4. Consolidate into a master budget and model the P&L impact. Does it meet the target financial outcome?
  5. Identify the explicit trade-offs being made: what is being cut or deferred, and why
  6. Document assumptions and the reforecast cadence

  ## Guidelines
  - Build bottom-up from required work; constrain top-down by the company envelope
  - Reserve 5–10% contingency for unplanned opportunities and incidents
  - Make trade-offs explicit. Leadership should consciously choose what not to fund
  - Track actuals vs. budget on a schedule. Year-end surprises mean the mid-year process failed

  ## Deliverable
  A budget document posted via `add_message`, containing: assumptions, consolidated P&L by department and category, headcount plan, capex schedule, contingency reserve, explicit trade-offs accepted, and the reforecast schedule.
