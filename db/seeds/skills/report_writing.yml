key: report_writing
name: Report Writing
description: Turn findings into a well-structured written report that leads with the conclusion and supports it with evidence
category: research
markdown: |
  # Report Writing

  ## Purpose
  Package research findings, analysis, or investigation results into a written document the reader can use. A good report leads with the answer, supports it with evidence, and is short enough that the reader actually finishes it.

  ## When to use
  - A task asks you to produce a written report summarizing research or analysis
  - A decision requires a standalone document the reader can consult later
  - Multiple streams of work need to be synthesized for an audience one level up

  ## Approach
  1. Identify the report's purpose and audience: what decision does it support, and what does the audience already know?
  2. Outline the structure before writing: executive summary, context, methodology, findings, implications, recommendations, appendices
  3. Draft the body first; write the executive summary last, as a standalone synthesis of the most important findings
  4. Use one key point per section. Headers, bullet points, and tables aid navigation
  5. Cut aggressively. Remove sentences that do not add information; replace jargon with plain language
  6. Proofread for factual accuracy, consistent terminology, and complete citations

  ## Guidelines
  - Lead with conclusions. Busy readers do not get past the first page
  - Use active voice and concrete language. "Revenue grew 23%" beats "revenue growth was observed"
  - Chart and table titles should state the finding, not describe what is shown
  - Separate facts, interpretations, and recommendations. Clarity on this builds credibility

  ## Deliverable
  A written report posted via `add_message` (or committed as a document when the scope warrants it), containing: title, date, audience; executive summary (half a page maximum); body with findings and supporting evidence; explicit recommendations; methodology appendix; and sources.
