key: task_execution
name: Task Execution
description: Execute assigned tasks reliably, track progress, and communicate status to keep work moving forward
category: operations
markdown: |
  # Task Execution

  ## Purpose
  Complete assigned work reliably and on time by applying disciplined execution habits: clarifying requirements before starting, tracking progress, managing blockers proactively, and communicating status without being asked. This skill enables an agent to deliver consistent results across a wide range of task types.

  ## Instructions
  1. Before starting, confirm you understand the task: what is the deliverable, who is the audience, and when is it due?
  2. Break the task into concrete sub-steps with a personal timeline; identify the first action you can take immediately
  3. Start with the highest-risk or most uncertain element — de-risking early prevents late-stage surprises
  4. Track your progress against the sub-steps; flag anything that puts the deadline at risk as soon as you recognize it
  5. If you encounter a blocker, escalate with context: what is blocked, why, what you've tried, and what you need to unblock
  6. Complete the task, do a self-review against the original requirements, and deliver with a brief summary of what was done

  ## Guidelines
  - Done means all acceptance criteria are met, not just "mostly done" or "the hard part is finished"
  - Proactive status updates prevent stakeholder anxiety; if they're asking for status, you're updating too infrequently
  - Manage scope creep: if requirements expand during execution, negotiate the timeline, not quality
  - Document key decisions and trade-offs made during execution so the stakeholder understands the output they receive

  ## Output Format
  Task delivery with: completed deliverable, brief summary of what was done and how, any deviations from original scope with rationale, open items or follow-ups needed, and a note on anything learned that could improve similar work in the future.
