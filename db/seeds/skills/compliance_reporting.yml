key: compliance_reporting
name: Compliance Reporting
description: Prepare accurate, complete regulatory and internal compliance reports that satisfy stated obligations
category: operations
markdown: |
  # Compliance Reporting

  ## Purpose
  Produce reports that satisfy specific regulatory, contractual, or internal governance obligations. The deliverable must be accurate, complete, on time, and defensible under scrutiny.

  ## When to use
  - A known reporting obligation is approaching its deadline
  - A new regulation, contract, or policy creates a new reporting requirement
  - An audit has requested documentation of a specific process or period

  ## Approach
  1. Identify the applicable obligations: regulatory, contractual, internal governance. Use `search_documents` to locate the authoritative requirement text
  2. Map each obligation to its required data source, the responsible role, and the deadline
  3. Gather the required data from the source systems with validation. Reconcile any discrepancies before including
  4. Draft the report in the prescribed format for the audience
  5. Review for completeness, accuracy, and internal consistency. Flag anything that needs resolution before submission
  6. Retain proof of submission and log the next due date

  ## Guidelines
  - Build a compliance calendar so deadlines never come as a surprise
  - Retain all supporting documentation for the legally required period
  - When a requirement is unclear, escalate to legal or regulatory counsel. Assumptions on compliance are expensive
  - Automate recurring data collection where possible to reduce manual error

  ## Deliverable
  A compliance report package posted via `add_message`, containing: obligation registry (requirement, frequency, owner, deadline), the completed report in the required format, data sources and validation notes, submission confirmation, and the next review date.
