key: performance_testing
name: Performance Testing
description: Measure and validate system performance under load to ensure it meets scalability and latency requirements
category: operations
markdown: |
  # Performance Testing

  ## Purpose
  Validate that the system meets defined performance requirements under expected and peak load conditions, identifying bottlenecks before they affect users. This skill enables an agent to design load tests, execute them against realistic scenarios, and translate results into actionable engineering recommendations.

  ## Instructions
  1. Define performance requirements: target response times (p50, p95, p99), throughput (requests/second), and error rate thresholds
  2. Design test scenarios that reflect real usage patterns: identify key user flows, their relative frequency, and peak load multipliers
  3. Set up the test environment with production-representative data volumes and infrastructure configuration
  4. Execute a baseline test at normal load to establish current performance characteristics
  5. Run load, stress, and spike tests: gradually increase load to find the system's breaking point and recovery behavior
  6. Analyze results: identify bottlenecks (CPU, memory, database query times, external API latency), and reproduce them in isolation

  ## Guidelines
  - Use production-representative data — tests against small datasets miss index and query plan issues that only appear at scale
  - Test the whole system, not just the application server; databases, caches, and third-party APIs all fail under load
  - Establish a performance baseline and run tests on every significant release — performance regressions are easy to miss otherwise
  - Fix the bottleneck, not just the symptom; adding cache to a slow query may help short-term but the query still needs to be fixed

  ## Output Format
  Performance test report with: test objectives and SLAs, test scenarios, environment configuration, baseline results, load/stress test results (throughput, latency percentiles, error rates at each load level), identified bottlenecks with evidence, and prioritized recommendations with expected impact.
