key: revenue_forecasting
name: Revenue Forecasting
description: Build and maintain a revenue model with named drivers, scenarios, and sensitivity to the top assumptions
category: research
markdown: |
  # Revenue Forecasting

  ## Purpose
  Produce a forecast that names the drivers of revenue, models them explicitly, and presents the answer as a range rather than a false-precision point estimate. The output should let leadership see what assumption would need to change for the number to move.

  ## When to use
  - A planning cycle requires an updated forecast
  - A material shift in pipeline, churn, or pricing requires re-forecasting
  - A decision requires scenario modeling (hire plan, funding ask, capacity planning)

  ## Approach
  1. Identify revenue drivers: new acquisition, expansion, churn, pricing, market growth
  2. Build a bottom-up model: pipeline × conversion × deal size for new business, plus cohort retention for recurring revenue
  3. Construct a top-down sanity check using market share and growth rate assumptions
  4. Run scenarios: base, upside, downside. Each with explicit assumption changes
  5. Perform sensitivity analysis: which input has the biggest effect on the answer?
  6. Update monthly with actuals and track forecast accuracy over time

  ## Guidelines
  - Separate deterministic revenue (contracted, recurring) from probabilistic revenue (pipeline) in the model
  - Avoid recency bias. A strong recent quarter can mask structural challenges
  - Present ranges, not point estimates. False precision erodes trust when actuals diverge
  - Share the methodology so reviewers can challenge the assumptions, not just the number

  ## Deliverable
  A revenue forecast posted via `add_message`, containing: methodology, driver assumptions, base/upside/downside scenarios with ranges, sensitivity analysis on the top 3 drivers, actual-vs-forecast tracker, and a narrative explaining the changes from the prior forecast.
