name: Audience Research
description: Gather and synthesize insights about target audiences to inform marketing, product, and content decisions
category: creative
markdown: |
  # Audience Research

  ## Purpose
  Develop deep, evidence-based understanding of the target audience's needs, behaviors, and motivations. This skill enables an agent to design research programs, synthesize findings from multiple sources, and translate insights into actionable recommendations for marketing, product, and content teams.

  ## Instructions
  1. Define research questions: what specific unknowns about the audience need to be resolved?
  2. Choose research methods appropriate to the questions: surveys, interviews, behavioral analytics, social listening, or secondary research
  3. Design research instruments (survey questions, interview guide) that minimize bias and generate actionable data
  4. Collect data with sufficient sample size and diversity to support confident conclusions
  5. Synthesize findings: identify patterns, segment the audience by need or behavior, and surface surprises
  6. Translate insights into audience personas and implications for messaging, product features, and content topics

  ## Guidelines
  - Triangulate findings across multiple research methods before treating insights as established
  - Distinguish what people say from what they do — behavioral data often contradicts stated preferences
  - Update personas annually or after major market shifts; stale personas mislead more than they help
  - Share research findings broadly — the value compounds when the whole organization learns from them

  ## Output Format
  Audience research report with: research questions, methodology description, key findings (quantitative and qualitative), audience segments, updated personas (one per segment), and implications for marketing, product, and content.
