key: data_analysis
name: Data Analysis
description: Extract insights from datasets to answer a specific business question, with clear methodology and honest uncertainty
category: research
markdown: |
  # Data Analysis

  ## Purpose
  Transform raw data into an answer to a specific business question. The deliverable names the question, the method, the finding, and the confidence — not a pile of charts for the reader to interpret.

  ## When to use
  - A task hands you a dataset and a question to answer from it
  - A decision requires evidence from existing data
  - Anomalous metrics need investigation

  ## Approach
  1. Define the business question before touching any data. What decision will this analysis inform?
  2. Identify the relevant data sources (via `search_documents` or attached data) and assess completeness, freshness, and reliability
  3. Explore and clean the data: missing values, outliers, data type issues, sampling bias
  4. Apply the right technique: descriptive statistics, cohort analysis, segmentation, correlation, regression, or time series — matched to the question
  5. Validate: are the results statistically meaningful, are there alternative explanations, are there confounders?
  6. Synthesize into insights and recommendations, clearly separating what the data shows from what it implies

  ## Guidelines
  - Define success metrics before analyzing. Analyzing data before knowing what you are looking for leads to p-hacking
  - Correlation is not causation. Distinguish observed patterns from causal claims
  - Show your methodology so reviewers can reproduce and challenge
  - Present uncertainty honestly. Confidence intervals build more trust than false precision

  ## Deliverable
  A data analysis report posted via `add_message`, containing: question being answered, data sources and limitations, methodology, key findings with supporting tables, confidence notes, implications and recommendations, and suggested follow-up analyses.
