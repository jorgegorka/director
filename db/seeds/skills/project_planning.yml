key: project_planning
name: Project Planning
description: Decompose a goal into sequenced tasks with dependencies, owners, and explicit out-of-scope items
category: operations
markdown: |
  # Project Planning

  ## Purpose
  Produce a plan that takes a goal from where it is now to done. The plan names every task, the order they must happen in, who owns each, and what is explicitly not being done. Its purpose is to let other agents execute without having to re-derive the sequence.

  ## When to use
  - A new goal has arrived and you need to lay out the path from here to done
  - An existing plan has drifted and the task list no longer reflects reality
  - A manager has asked you for a timeline they can trust

  ## Approach
  1. Read the goal carefully via `get_task_details`. Write down, in one sentence, what "done" looks like
  2. List every deliverable implied by the goal. For each, identify the tasks required to produce it
  3. Identify dependencies: which tasks cannot start before others complete? Mark the critical path — the longest chain of dependent tasks
  4. Name an owner (role) for every task. If no role fits, flag it as a hiring need
  5. Identify the top risks that could invalidate the plan, and what signals would trigger a re-plan
  6. Explicitly list what is out of scope. Scope creep starts where the non-goals were never written down

  ## Guidelines
  - Buffer the critical path. Every plan without contingency slips
  - Keep tasks small enough that a single reportee can finish one in a single session
  - A plan you do not maintain is a plan that will be ignored — update it when assumptions change
  - Tasks without owners are aspirations. Every task in the plan must have a role attached

  ## Deliverable
  A project plan posted via `add_message` on the goal or parent task, containing: scope and non-goals, task list with owner and dependency, critical path, risks, and re-plan triggers. When the plan is approved, create the first wave of tasks via `create_task`.
