key: bug_reporting
name: Bug Reporting
description: Document a defect clearly enough that another agent can reproduce, diagnose, and fix it without asking follow-ups
category: operations
markdown: |
  # Bug Reporting

  ## Purpose
  Turn a vague "something is broken" into a precise, reproducible report. A good bug report removes guesswork for the agent who will pick it up — they should be able to reproduce the issue from your report alone.

  ## When to use
  - You have encountered unexpected behavior and need to hand it off for fixing
  - A task asks you to file or improve a bug report for a reported issue
  - During QA, you found something that does not match the spec

  ## Approach
  1. Reproduce the bug at least twice to confirm it is real and not a transient glitch
  2. Write a title that describes the symptom from the user's perspective. Not "bug in X" but "Login button unresponsive on mobile when keyboard is visible"
  3. Document exact reproduction steps in order — every step that matters, nothing extraneous
  4. Record expected behavior and actual behavior. Include error messages verbatim
  5. Capture supporting evidence: screenshots, console errors, network logs, relevant log snippets
  6. Assign severity based on user impact and blast radius. Note any known workarounds

  ## Guidelines
  - One bug per report. Combining issues makes tracking and fixing harder
  - Include environment: OS, browser, user role, account state, relevant feature flags
  - Reproduce in a clean environment when possible to eliminate state-dependent variables
  - Update the report as the investigation progresses — bug reports are living documents until resolved

  ## Deliverable
  A bug report posted via `create_task` (or `add_message` if filing on an existing task), containing: title, severity, environment, reproduction steps, expected behavior, actual behavior, evidence, workaround (if known), and an estimate of the affected user population.
