key: implementation
name: Implementation
description: Turn a specification into small, tested, readable code changes that integrate cleanly with the existing codebase
category: technical
markdown: |
  # Implementation

  ## Purpose
  Translate a task's requirements into working code that is correct, tested, and easy for the next agent to maintain. The discipline of this skill is incrementalism: small steps, each verified, rather than one large change that is hard to review and risky to merge.

  ## When to use
  - A task assigns you to build, modify, or extend code
  - You are implementing a decision made by another agent
  - A bug fix has been scoped and you have been handed the fix plan

  ## Approach
  1. Read the task description and any linked spec. Clarify ambiguities by posting a question via `add_message` before you start writing code — never guess on scope
  2. Break the work into small, independently verifiable units. If a unit cannot be verified by a test, it is probably too big
  3. Write or update tests that capture the expected behavior before or alongside the implementation
  4. Implement incrementally: simplest version first, then edge cases, then optimizations — not the reverse
  5. Review your own diff as if you were reviewing someone else's: naming, error handling, test coverage, removed dead code
  6. Summarize the change on the task: problem solved, approach taken, tests added, and any follow-ups

  ## Guidelines
  - Make the code readable for the next agent, not clever for yourself
  - Handle errors at the right level: validate at boundaries, propagate with context, log at actionable points
  - Keep changes focused. If you find yourself fixing unrelated things, create a separate task
  - Never merge with failing tests. A failing test is a bug — either in the code or in the test

  ## Deliverable
  Working code committed with tests, plus a message posted via `add_message` summarizing the change: problem, approach, files touched, tests added, and known limitations or follow-up work.
