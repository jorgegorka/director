key: implementation
name: Implementation
description: Write clean, maintainable code that correctly implements features according to specifications
category: technical
markdown: |
  # Implementation

  ## Purpose
  Translate product requirements and technical designs into working, well-structured code. This skill enables an agent to break down features into implementable units, write clean and tested code, and integrate changes into the existing codebase without introducing regressions.

  ## Instructions
  1. Read and understand the requirements thoroughly before writing any code; clarify ambiguities upfront
  2. Break the feature into small, independently verifiable units of work (functions, classes, or service objects)
  3. Write tests first (or alongside) the implementation to define expected behavior and catch regressions
  4. Implement incrementally: get the simplest version working, then add edge case handling and optimizations
  5. Review your own code before submitting: check naming, error handling, test coverage, and performance
  6. Submit a focused, well-described pull request with context on what changed and why

  ## Guidelines
  - Make code readable for the next engineer, not just correct for the machine
  - Prefer explicit over implicit — clever code is a liability when the author has left
  - Handle errors at the right level: validate at boundaries, propagate errors with context, log at actionable points
  - Keep changes small and frequent; large PRs are hard to review and risky to merge

  ## Output Format
  Implementation deliverable: working code with tests, a pull request description covering the problem solved, implementation approach, testing notes, and any known limitations or follow-up work.
