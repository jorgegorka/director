key: infrastructure_management
name: Infrastructure Management
description: Provision, configure, and maintain cloud and on-premises infrastructure to support reliable operations
category: operations
markdown: |
  # Infrastructure Management

  ## Purpose
  Ensure that the infrastructure supporting the product is reliable, secure, cost-efficient, and scalable. This skill enables an agent to manage infrastructure as code, maintain configuration consistency, and handle capacity planning to prevent availability issues before they arise.

  ## Instructions
  1. Audit current infrastructure: catalog all services, instances, databases, networks, and their purposes and costs
  2. Define infrastructure standards: naming conventions, tagging strategy, environment parity, and access control model
  3. Manage infrastructure as code (IaC): ensure all infrastructure is defined in version-controlled configuration files, not manual console changes
  4. Monitor resource utilization and set alarms for capacity thresholds; proactively right-size over-provisioned resources
  5. Enforce security controls: network segmentation, least-privilege IAM policies, encryption at rest and in transit
  6. Conduct regular infrastructure reviews: identify single points of failure, cost optimization opportunities, and outdated configurations

  ## Guidelines
  - Never make production infrastructure changes manually — all changes should go through code review and CI
  - Tag every resource with environment, owner, and cost center; untagged resources are untracked costs
  - Test disaster recovery procedures regularly — a backup you haven't restored is a backup you can't trust
  - Document the rationale for non-standard infrastructure decisions so future operators understand the context

  ## Output Format
  Infrastructure management report with: inventory of all infrastructure resources, cost breakdown by service and environment, capacity utilization summary, security compliance checklist, identified single points of failure, and recommended improvements with priority and effort estimates.
