key: infrastructure_management
name: Infrastructure Management
description: Define and maintain infrastructure as code, enforce configuration standards, and plan capacity proactively
category: operations
markdown: |
  # Infrastructure Management

  ## Purpose
  Produce and maintain the plans, configuration, and diffs that keep the product's infrastructure reliable, secure, and cost-efficient. The deliverable of this skill is written work — an audit, a config change, a plan — not live kubectl commands.

  ## When to use
  - A task asks you to review, change, or plan infrastructure
  - A cost, capacity, or reliability signal requires investigation
  - A new service needs a production-ready infrastructure footprint

  ## Approach
  1. Audit the current state: catalog services, instances, databases, networks, and their purposes and costs
  2. Apply infrastructure standards: naming conventions, tagging, environment parity, access control
  3. Manage changes as code: every change lands as a diff in the IaC repo, reviewed like application code
  4. Check resource utilization against capacity thresholds. Proactively right-size over-provisioned resources
  5. Enforce security controls: network segmentation, least-privilege IAM, encryption at rest and in transit
  6. Identify single points of failure, cost hotspots, and outdated configurations

  ## Guidelines
  - Never make production infrastructure changes outside the IaC workflow
  - Every resource needs environment, owner, and cost-center tags. Untagged resources are untracked costs
  - A backup you have not restored is a backup you cannot trust. Test recovery procedures on a schedule
  - Document the rationale for non-standard decisions so future operators understand the context

  ## Deliverable
  An infrastructure document posted via `add_message` (and, where changes are proposed, a diff committed to the IaC repo referenced by file path), containing: inventory, cost breakdown, capacity summary, security checklist, identified SPOFs, and recommended improvements with priority.
