key: requirements_gathering
name: Requirements Gathering
description: Synthesize functional and non-functional requirements from goal descriptions, existing docs, and task threads
category: operations
markdown: |
  # Requirements Gathering

  ## Purpose
  Turn a vague goal or task description into a concrete, prioritized set of requirements that downstream agents can build against. The deliverable is a requirements document specific enough that a reasonable reader would not need to ask clarifying questions before starting work.

  ## When to use
  - A goal has arrived with ambiguous or incomplete scope
  - A reportee is blocked because "what done looks like" is not yet specified
  - You are preparing to hand work off and the receiving agent needs a spec

  ## Approach
  1. Read the goal via `get_task_details` and any linked documents via `search_documents`. Every requirement must be traceable to a stated intent
  2. Separate functional requirements (what the system must do) from non-functional requirements (performance, security, compliance, availability)
  3. Document each requirement in a consistent format — user stories or structured specs — with acceptance criteria
  4. Where intent is unclear, post a specific question via `add_message` on the goal. Do not invent requirements to fill gaps
  5. Review the set for conflicts, gaps, and ambiguity. Flag conflicts for decision
  6. Prioritize using MoSCoW (Must / Should / Could / Won't). Not every requirement can be in scope

  ## Guidelines
  - Ask "why" before accepting a stated requirement at face value. Surface the underlying need, not the surface request
  - Ambiguous requirements are technical debt. They will cause rework if not clarified before implementation
  - Trace every requirement to a goal. Requirements with no traceable purpose are candidates for removal
  - Explicitly list what is out of scope. Scope creep starts in the silences

  ## Deliverable
  A requirements document posted via `add_message` on the parent goal, containing: goal context, functional requirements with acceptance criteria (MoSCoW-prioritized), non-functional requirements, assumptions and constraints, explicit non-goals, and a list of open questions.
