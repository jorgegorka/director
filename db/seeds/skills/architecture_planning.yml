key: architecture_planning
name: Architecture Planning
description: Design the structural blueprint of a system or service with explicit trade-offs and recorded decisions
category: technical
markdown: |
  # Architecture Planning

  ## Purpose
  Define the structural shape of a system: its major components, the contracts between them, and the constraints it must satisfy. This skill is used when the decisions are too big or too irreversible to be made inside an implementation task — they need to be written down, reviewed, and revisited over time.

  ## When to use
  - A new system or subsystem is being planned and the component boundaries do not yet exist
  - An existing architecture is under strain and a refactor or replatforming is being considered
  - A hard constraint has changed (scale, compliance, cost) and the current design may no longer fit

  ## Approach
  1. Gather requirements: functional goals, non-functional constraints (latency, scale, availability, cost), and team capability
  2. Identify the major components and their responsibilities. Draw a context diagram in words — inputs, outputs, neighbors
  3. Define data flows and integration points between components, including external systems
  4. Evaluate candidate patterns (monolith, modular monolith, service split, event-driven) against the actual constraints. Do not pick by fashion
  5. Design for failure: retries, circuit breakers, degraded modes. Each component boundary is a place failure will happen
  6. Record the chosen architecture as an Architecture Decision Record (ADR): context, options considered, decision, consequences, and what would cause a revisit

  ## Guidelines
  - Prefer the simplest architecture that meets the constraints. Complexity is a tax you pay forever
  - Make architectural decisions reversible where possible. Defer irreversible ones until more is known
  - Document rejected alternatives and why — this prevents relitigating decisions later
  - Validate the design with an agent who will actually build it before finalizing

  ## Deliverable
  An architecture document posted via `add_message` (or committed as an ADR), containing: requirements summary, component map, data flows, technology choices with rationale, rejected alternatives, identified risks, and a glossary of domain terms.
