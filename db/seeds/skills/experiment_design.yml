key: experiment_design
name: Experiment Design
description: Design rigorous experiments and A/B tests that generate causal evidence instead of correlational observations
category: research
markdown: |
  # Experiment Design

  ## Purpose
  Produce experiment plans that generate reliable causal evidence. Pre-registering hypotheses, sample sizes, and analysis plans before data collection is what separates an experiment from a fishing expedition.

  ## When to use
  - A task asks you to design an A/B test, controlled rollout, or other experiment
  - A decision rests on whether a proposed change actually causes an effect
  - An existing test has run inconclusively and needs a stronger design

  ## Approach
  1. State the hypothesis: what specific, measurable change do you expect, in which direction, for which population?
  2. Identify the primary metric (the single variable that determines success) and secondary guardrail metrics
  3. Calculate minimum sample size via statistical power analysis: alpha, power, minimum detectable effect
  4. Design the treatment: what exactly changes between control and treatment? Minimize confounds
  5. Define the randomization unit (user, session, company) and ensure proper traffic splitting
  6. Plan the analysis in advance: statistical test, analysis timing, early-stopping rules, multiple comparison handling

  ## Guidelines
  - Pre-register hypotheses and analysis plans before data collection. This prevents post-hoc hypothesis invention
  - Power experiments properly. Underpowered experiments waste resources and produce ambiguous results
  - Run for full business cycles (at least two weeks) to avoid day-of-week and novelty effects
  - Do not call experiments early on first-sight significance. Peeking inflates false positives

  ## Deliverable
  An experiment design document posted via `add_message`, containing: hypothesis, primary and guardrail metrics, sample size calculation, randomization strategy, treatment description, pre-planned analysis method, duration, success criteria, and rollout plan for winners.
