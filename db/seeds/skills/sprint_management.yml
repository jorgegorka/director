key: sprint_management
name: Sprint Management
description: Facilitate agile sprints — planning, daily standups, reviews, and retrospectives — to maintain team velocity
category: operations
markdown: |
  # Sprint Management

  ## Purpose
  Facilitate a structured two-week delivery cycle that helps the team focus on committed work, surface blockers early, and continuously improve their process. This skill enables an agent to run effective sprint ceremonies, maintain a healthy backlog, and provide stakeholders with predictable delivery cadence and visibility.

  ## Instructions
  1. Sprint planning: select stories from the prioritized backlog that fit the team's capacity; confirm acceptance criteria and technical approach for each
  2. Create a sprint goal — a single sentence summarizing the sprint's primary outcome — to guide prioritization when trade-offs arise mid-sprint
  3. Facilitate daily standups: what was done, what's planned today, and what is blocked? Keep to 15 minutes; resolve blockers offline
  4. Track sprint progress daily using a burndown chart; raise an alert if the team is more than 20% behind by mid-sprint
  5. Sprint review: demonstrate completed work to stakeholders, gather feedback, and update the backlog accordingly
  6. Retrospective: identify what went well, what didn't, and one actionable improvement to implement next sprint

  ## Guidelines
  - Protect the sprint commitment from scope additions; changes should wait for the next sprint unless truly critical
  - Velocity is a planning tool, not a performance metric — avoid using it to pressure the team
  - Blockers that aren't resolved within 24 hours need escalation; waiting is not managing
  - The retrospective action item must be assigned an owner or it will never happen

  ## Output Format
  Sprint artifacts: sprint planning notes (goal, committed stories, capacity), daily standup log, burndown chart (described), sprint review notes (demo'd, feedback), retrospective summary (went well, to improve, action item with owner).
