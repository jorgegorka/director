key: brand_management
name: Brand Management
description: Define, protect, and evolve the brand identity to build lasting recognition and customer trust
category: creative
markdown: |
  # Brand Management

  ## Purpose
  Steward a consistent, compelling brand identity across every customer touchpoint to build recognition, trust, and preference. This skill enables an agent to audit brand expression, identify inconsistencies, and develop guidelines that empower the whole organization to communicate the brand accurately.

  ## Instructions
  1. Audit current brand expression: review logo usage, messaging, visual style, and tone across all channels
  2. Define or reaffirm brand positioning: what does the brand stand for and how does it differ from competitors?
  3. Develop or update brand guidelines covering: logo, color palette, typography, imagery, voice, and tone
  4. Identify brand touchpoints — website, sales materials, product UI, social media, customer support — and assess consistency
  5. Create templates and asset libraries that make it easy for teams to stay on-brand without constant oversight
  6. Define a brand governance process: who approves major brand decisions and how are violations corrected?

  ## Guidelines
  - Brand is built through consistent repetition — resist the urge to reinvent it frequently
  - Protect the brand's most distinctive elements fiercely; let flexibility exist in less critical areas
  - Test brand perception with real customers periodically — internal consensus does not equal market perception
  - Document brand evolution decisions so institutional knowledge doesn't depend on individuals

  ## Output Format
  Brand management report with: brand audit findings, positioning statement, updated brand guidelines summary, touchpoint consistency scorecard, asset library inventory, and a governance RACI.
