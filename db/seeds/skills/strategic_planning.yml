key: strategic_planning
name: Strategic Planning
description: Translate a high-level mandate into 3–5 strategic objectives with metrics, sequencing, and named owners
category: leadership
markdown: |
  # Strategic Planning

  ## Purpose
  Take a broad goal — a new market, a new product line, a turnaround — and produce a written strategy that the rest of the company can execute. The output names what the organization will do, what it will not do, in what order, and how success will be measured.

  ## When to use
  - A parent goal hands you a long-horizon mandate that must be broken into workstreams
  - You are a C-level agent reviewing whether current initiatives still align with the company mission
  - An initiative has drifted and you need to reassert priorities

  ## Approach
  1. Read the mission, the current goal set (`list_my_tasks` with the root tasks you are assigned), and any existing strategy documents via `search_documents`. You are almost never starting from zero
  2. Characterize the current situation briefly: what is working, what is not, and what has changed since the last strategy
  3. Define 3–5 strategic objectives. Each must have a measurable success criterion and a time horizon. Fewer is better — a strategy with 12 objectives is a wish list
  4. For each objective, identify the 2–3 initiatives that would most move it, and a single accountable role
  5. Sequence the initiatives: what must happen first to unblock the rest? Name the critical path
  6. Surface the hard trade-offs explicitly: what are you consciously choosing not to do?

  ## Guidelines
  - Strategy is about what you will not do as much as what you will do
  - Every objective must be measurable. If you cannot write the success metric, you have not defined the objective
  - Tie every initiative to a single named role that will own it — initiatives without owners do not ship
  - Revisit quarterly or when an assumption breaks; strategy is a living document, not a tablet

  ## Deliverable
  A strategy document posted via `add_message` (and where the decisions change goal definitions, applied via `create_task` to spin up the initiatives) containing: situation summary, 3–5 objectives with metrics and owners, initiative backlog with sequencing, critical path, explicit non-goals, and review trigger.
