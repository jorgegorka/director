key: monitoring_alerting
name: Monitoring & Alerting
description: Instrument systems and configure actionable alerts so production issues are detected before users are affected
category: operations
markdown: |
  # Monitoring & Alerting

  ## Purpose
  Decide what to measure, what to alert on, and at what threshold — so that production problems are detected early and the agents on call receive signal rather than noise. Every alert should be actionable; every metric should tie to a user-visible outcome.

  ## When to use
  - A new service is going to production and needs observability
  - An incident revealed that a failure was not detected in time
  - Alert fatigue is degrading response quality and the alert set needs pruning

  ## Approach
  1. Define the golden signals for each service: latency (p50/p95/p99), traffic, error rate, saturation
  2. Instrument the application to emit these signals: structured logs, metrics, distributed traces, health checks
  3. Configure alerts on symptoms (user-facing impact) before causes (CPU high). Each alert must be actionable
  4. Set thresholds based on historical data and SLAs. Tune aggressively to avoid alert fatigue
  5. Build dashboards that give an at-a-glance health view and allow drill-down during incidents
  6. Test alerts regularly. An alert you have never seen fire is an alert you cannot trust

  ## Guidelines
  - Alert on symptoms first. Cause-based alerts fire before users notice and produce noise
  - Every alert must have a linked runbook explaining what it means and how to respond
  - If an alert does not require immediate action, it should be a dashboard metric, not a page
  - Review alert history on a regular cadence: which fired unnecessarily, which failures were missed?

  ## Deliverable
  A monitoring and alerting plan posted via `add_message`, containing: golden signals per service, instrumentation checklist, alert inventory (signal, threshold, severity, runbook), dashboard description, escalation policy, and review cadence.
