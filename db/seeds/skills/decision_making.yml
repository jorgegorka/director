key: decision_making
name: Decision Making
description: Reach a well-reasoned decision under uncertainty and record the rationale so it can be revisited later
category: leadership
markdown: |
  # Decision Making

  ## Purpose
  Choose among competing options in a way that is transparent, defensible, and revisable. The output of this skill is not just "a decision" — it is a record that future agents (including you) can audit if circumstances change.

  ## When to use
  - A goal or task explicitly asks you to choose between options
  - You are about to commit to an approach that would be expensive to reverse
  - Your reportees are blocked because nobody has decided the next step

  ## Approach
  1. Frame the decision as a single clear question with a deadline. If the question is not yet clear, your first job is to sharpen it
  2. List decision criteria and weight them by importance — typical criteria: impact, cost, speed, reversibility, risk
  3. Generate at least three options. Binary framing ("do X or not") is a warning sign that you missed a third path
  4. Score each option against the weighted criteria using the evidence you have. Mark unknowns as unknowns; do not pretend to knowledge you lack
  5. Run a brief pre-mortem on the preferred option: if this fails in six months, what would the reason most likely be?
  6. Commit. Record the decision, the rationale, the assumptions, and the trigger that would prompt revisiting it (a date or an event)

  ## Guidelines
  - Distinguish reversible from irreversible decisions — irreversible ones warrant more rigor and slower commitment
  - Do not gather data indefinitely. The cost of delay is real; name the decision deadline up front
  - A single owner makes the final call. If the goal gives you the decision, you own it — do not defer back without reason
  - Record dissenting considerations; they are the first thing to revisit if the decision turns out wrong

  ## Deliverable
  A decision record posted via `add_message` containing: the question, the options, the criteria and weights, the chosen option with rationale, the key assumption, and the review trigger.
