key: quality_standards
name: Quality Standards
description: Define measurable quality criteria and the gates that enforce them in the development process
category: operations
markdown: |
  # Quality Standards

  ## Purpose
  Decide what "good enough to ship" means in specific, measurable terms, and wire those criteria into the development process so the whole agent team is held to the same bar. Standards that are not enforced are aspirations.

  ## When to use
  - A new project needs its quality bar defined
  - An incident has revealed that the current standards are inadequate or unenforced
  - A reportee has asked for clarification on what "done" requires

  ## Approach
  1. Identify the relevant quality dimensions: correctness, reliability, performance, security. Only include dimensions that matter for this work
  2. Write measurable criteria for each dimension. "Fast" is not a criterion; "p95 latency under 500ms" is
  3. Map each criterion to a gate in the process: where is it enforced, by what mechanism, and who verifies?
  4. Automate what can be automated: CI tests, linters, security scanners, coverage thresholds
  5. Document the defect process: how bugs are reported, triaged, prioritized, and closed
  6. Review the standards on a regular cadence or after a significant incident

  ## Guidelines
  - Criteria that the team cannot meet consistently will be ignored. Calibrate to reality and raise the bar incrementally
  - Measure trends, not only point-in-time status. Trends reveal systemic issues
  - Invest in tooling that catches issues before code review, not after deployment
  - Every standard must have a single owner. Standards without owners decay

  ## Deliverable
  A quality standards document posted via `add_message`, containing: dimensions and measurable criteria, process gate map, automated check inventory, defect management flow, and the review schedule.
