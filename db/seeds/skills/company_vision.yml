key: company_vision
name: Company Vision
description: Articulate and communicate an inspiring long-term vision that motivates teams and guides decisions
category: leadership
markdown: |
  # Company Vision

  ## Purpose
  Craft a clear, compelling vision that defines what the company aspires to become over the next 5–10 years. This skill enables an agent to translate strategic intent into memorable narrative that aligns stakeholders, attracts talent, and serves as a north star for day-to-day decision-making.

  ## Instructions
  1. Review the company's founding story, core values, and existing mission statement
  2. Identify the most ambitious but believable future state the company could achieve
  3. Draft a vision statement (one to three sentences) that is inspiring, specific, and time-horizoned
  4. Test the vision against the "does it guide difficult decisions?" filter — would it help a team choose between two valid options?
  5. Develop supporting narrative: the world this vision creates, who benefits, and why only this company can achieve it
  6. Refine through feedback from leadership and frontline teams; balance aspiration with credibility

  ## Guidelines
  - Vision differs from mission: mission is what you do today; vision is what you're building toward
  - Avoid jargon and generic phrases ("world-class," "leading provider") in favor of specific imagery
  - The vision should feel slightly out of reach — achievable only through sustained collective effort
  - Revisit every 3–5 years or after major strategic pivots

  ## Output Format
  A vision statement (1–3 sentences), supporting narrative (2–3 paragraphs explaining context and impact), and a brief alignment checklist confirming it passes the decision-guidance test.
