key: system_design
name: System Design
description: Produce a detailed technical design that engineers can implement without ambiguity
category: technical
markdown: |
  # System Design

  ## Purpose
  Turn a set of requirements into a concrete technical design — components, APIs, data schemas, failure modes — that an implementation-focused agent can follow step by step. The design names every non-trivial choice and explains why it was made.

  ## When to use
  - A task asks you to design a new service, feature, or significant refactor
  - Multiple implementation approaches are viable and the choice must be made deliberately
  - A downstream agent is blocked because the design is not yet specified

  ## Approach
  1. Clarify requirements: functional behavior, scale (users, requests/sec, data volume), latency targets, and availability expectations. If these are missing, ask before designing
  2. Sketch the high-level architecture: major services, databases, caches, queues, and the data flows between them
  3. Specify the API surface: endpoints, request and response schemas, authentication, idempotency, and error modes
  4. Design the data model: tables or collections, keys, indexes, relationships, and expected growth
  5. Address cross-cutting concerns: rate limiting, pagination, retries, observability, backfill
  6. Back-of-envelope capacity: storage growth, bandwidth, compute. Flag anything that will not fit on the current infra

  ## Guidelines
  - Start broad, then drill down. Do not spec a schema before the component boundaries are clear
  - State your assumptions explicitly so reviewers can challenge them
  - Design for the failure cases, not only the happy path. Every boundary has an error mode
  - Simpler is better. Every additional service is ongoing operational overhead

  ## Deliverable
  A system design document posted via `add_message` (or committed as an ADR when one is warranted), containing: requirements summary, architecture sketch, API spec excerpt, data model, capacity estimates, open questions, and explicitly rejected alternatives with rationale.
