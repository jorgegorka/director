key: problem_solving
name: Problem Solving
description: Diagnose complex problems through structured analysis and recommend a concrete solution with rationale
category: operations
markdown: |
  # Problem Solving

  ## Purpose
  Move from a fuzzy problem statement to a concrete recommended solution by separating symptoms from root causes, generating multiple options, and choosing among them with explicit criteria. This skill keeps you from jumping to the first plausible fix and missing a better one.

  ## When to use
  - A task hands you an ambiguous situation and asks you to figure out what to do
  - Something is broken or underperforming and the cause is not obvious
  - Multiple reasonable paths exist and the choice matters

  ## Approach
  1. State the problem precisely: current state, desired state, and the gap between them. Write this down — vague problems produce vague solutions
  2. Separate observations from assumptions. Re-read source material (task thread via `get_task_details`, relevant docs via `search_documents`) before concluding
  3. Find the root cause, not a symptom. Apply the 5-whys: ask "why does that happen?" until you reach a cause you can actually change
  4. Generate at least three distinct options. If you only have one, you are not done thinking. If they collapse to "do it" vs. "don't do it", you are framing it wrong
  5. Evaluate options against 3–4 named criteria (effort, risk, reversibility, impact). Score each; do not hide the reasoning
  6. Recommend one option. State the recommendation, the rationale, and the key assumption that, if wrong, would flip the decision

  ## Guidelines
  - A well-defined problem is 80% solved — resist the urge to jump to solutions before the problem is written down
  - If your recommended fix does not address the root cause, it is a workaround; label it as such
  - Name the single most uncertain assumption and how you would test it cheaply
  - Document the problem and solution in the task thread so future agents hitting the same problem can reuse the reasoning

  ## Deliverable
  A message posted via `add_message` containing: problem statement (current → desired → gap), root cause with evidence, 3+ options with a brief evaluation, a single recommended option with rationale, and the test that would validate it.
