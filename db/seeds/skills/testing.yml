key: testing
name: Testing
description: Write small, fast, reliable automated tests that verify behavior and catch regressions
category: technical
markdown: |
  # Testing

  ## Purpose
  Build an automated test suite that lets agents change and ship code with confidence. Each test should verify one specific behavior, run fast, and fail clearly when the behavior is broken.

  ## When to use
  - A task adds new functionality that needs coverage
  - You fixed a bug and need to lock in the fix with a regression test
  - A critical path is untested and you are asked to fill the gap

  ## Approach
  1. Identify what needs testing: new behavior, bug fixes, or untested critical paths in existing code
  2. Choose the right level: unit tests for isolated logic, integration tests for component interactions, end-to-end tests only for genuinely critical user flows
  3. Write each test small, focused, and independent. One behavior per test; no ordering dependencies between tests
  4. Use test doubles (fakes, stubs, mocks) to isolate the unit under test from slow or unstable dependencies — but prefer real collaborators when they are fast and stable
  5. Assert the actual outcome, not just that the code ran. A test that only checks "no exception" rarely catches bugs
  6. Name each test so the name alone explains what behavior it verifies

  ## Guidelines
  - Tests are documentation. A well-named test teaches the next agent how the code is meant to behave
  - Fix flaky tests immediately. A test that sometimes passes gives false confidence and will be ignored
  - Test edge cases explicitly: empty inputs, nil, boundaries, concurrency
  - Slow tests do not get run. Keep the suite fast or split it into tiers

  ## Deliverable
  Test files committed with descriptive test names, plus a short message via `add_message` noting what is covered, what is intentionally not covered, and any coverage gaps worth a follow-up task.
