markdown: |
  # Literature Review

  ## Purpose
  Synthesize existing published research, reports, and authoritative sources to establish what is already known, identify gaps, and build a rigorous foundation for new analysis or decisions. This skill enables an agent to conduct systematic and scoping reviews, critically evaluate source quality, and produce a synthesis that adds analytical value beyond simple summarization.

  ## Instructions
  1. Define the review scope: what question are you trying to answer and what time period, disciplines, and source types are relevant?
  2. Develop a search strategy: identify key terms, databases, and authoritative sources (peer-reviewed journals, industry reports, conference proceedings)
  3. Screen results: apply inclusion/exclusion criteria to focus on sources that are directly relevant and methodologically sound
  4. Extract key findings from each source: main claim, methodology, sample/data, limitations, and relevance to the review question
  5. Synthesize across sources: identify areas of consensus, contradiction, and gap; organize findings thematically, not source-by-source
  6. Evaluate the strength of evidence: consider source credibility, replication, and recency

  ## Guidelines
  - Summarize what sources say; synthesize what they mean together — synthesis is the differentiating skill
  - Cite sources precisely so claims can be independently verified
  - Acknowledge limitations: a literature review is only as good as the sources it covers and the search strategy used
  - Update reviews when significant new research is published; outdated literature reviews mislead as much as no review at all

  ## Output Format
  Literature review with: review question and scope, search strategy, source selection criteria, thematic synthesis of findings (not source-by-source summaries), evidence strength assessment, gaps identified in the literature, and implications for the current work.
