key: literature_review
name: Literature Review
description: Systematically survey existing published sources and synthesize findings thematically, not source-by-source
category: research
markdown: |
  # Literature Review

  ## Purpose
  Establish what is already known about a topic by reading the authoritative sources, then synthesize the findings in a way that adds value beyond summarization. The output helps downstream agents avoid redoing work that has already been done.

  ## When to use
  - A task asks you to establish context or prior art before new research
  - A decision requires grounding in existing evidence
  - An area is being explored for the first time and the knowledge landscape needs mapping

  ## Approach
  1. Define scope: what question are you answering, and what time period, disciplines, and source types are relevant?
  2. Develop a search strategy: key terms, databases, and authoritative sources. Use `search_documents` for internal material and WebSearch for external
  3. Screen results against inclusion and exclusion criteria to focus on directly relevant, methodologically sound sources
  4. Extract from each source: main claim, methodology, sample or data, limitations, relevance
  5. Synthesize across sources thematically: consensus, contradiction, and gap. Organize by theme, not by source
  6. Evaluate evidence strength: source credibility, replication, recency

  ## Guidelines
  - Summarize what sources say; synthesize what they mean together. Synthesis is the differentiating skill
  - Cite sources precisely so claims can be verified
  - Acknowledge limitations. A review is only as good as its search strategy
  - Mark areas where the literature is thin or contested — these are decision points for downstream work

  ## Deliverable
  A literature review posted via `add_message`, containing: review question and scope, search strategy, source selection criteria, thematic synthesis (not per-source summaries), evidence strength assessment, identified gaps, and implications for current work.
