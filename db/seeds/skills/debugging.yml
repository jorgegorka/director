key: debugging
name: Debugging
description: Diagnose and resolve software defects systematically using evidence-based investigation techniques
category: technical
markdown: |
  # Debugging

  ## Purpose
  Locate the root cause of software failures, unexpected behaviors, and performance problems through systematic investigation rather than guesswork. This skill enables an agent to move efficiently from symptom to root cause, apply targeted fixes, and prevent recurrence through improved test coverage or defensive coding.

  ## Instructions
  1. Reproduce the bug reliably in a controlled environment before attempting any fix
  2. Gather evidence: error messages, stack traces, logs, and the exact sequence of inputs that trigger the failure
  3. Form a hypothesis about the root cause based on evidence; avoid changing multiple things at once
  4. Isolate the failure: use binary search (disable half the code), add targeted logging, or write a failing test that captures the bug
  5. Apply the minimal fix that addresses the root cause; avoid broad changes that mask the underlying issue
  6. Verify the fix resolves the symptom, passes existing tests, and does not introduce new failures

  ## Guidelines
  - Never deploy an untested fix to production — reproduce first, fix second, verify third
  - Resist the urge to immediately modify code; investigation first saves more time than it costs
  - When you find one bug, look for siblings — bugs often cluster around the same area or assumption
  - Write a regression test for every bug fixed; the same bug should never recur undetected

  ## Output Format
  Bug resolution record with: original symptom, reproduction steps, root cause analysis, fix description and code diff, regression test added, and any related issues or preventive recommendations.
