key: debugging
name: Debugging
description: Diagnose the root cause of a software failure through evidence-based investigation and apply a minimal, verified fix
category: technical
markdown: |
  # Debugging

  ## Purpose
  Move efficiently from symptom to root cause, apply a targeted fix, and prevent recurrence with a regression test. The discipline of this skill is refusing to change code before you understand the cause.

  ## When to use
  - A task reports that something is broken, failing, or misbehaving
  - A test is red and you do not yet know why
  - Unexpected behavior shows up that cannot be attributed to an intended change

  ## Approach
  1. Reproduce the bug reliably in a controlled environment before attempting any fix. If you cannot reproduce it, your first job is finding the repro, not fixing
  2. Gather evidence: error messages, stack traces, logs, and the exact inputs that trigger the failure. Read the task thread via `get_task_details` for any prior context
  3. Form a single hypothesis about the root cause based on the evidence. Do not change multiple things at once
  4. Isolate the failure: binary-search the code, add targeted logging, or write a failing test that captures the bug
  5. Apply the minimal fix that addresses the root cause. Avoid broad changes that mask the underlying issue
  6. Verify: the symptom is gone, existing tests still pass, and a new regression test captures the bug

  ## Guidelines
  - Never ship an unreproduced "fix" — reproduce first, fix second, verify third
  - Resist the urge to edit code during investigation. Investigation is cheaper than rework
  - When you find one bug, look for siblings — bugs cluster around the same assumption
  - Every bug fixed gets a regression test. The same bug should never recur undetected

  ## Deliverable
  A bug resolution record posted via `add_message` on the task, containing: original symptom, reproduction steps, root cause analysis, the fix (with diff or file paths), the regression test added, and any sibling issues worth a follow-up task.
