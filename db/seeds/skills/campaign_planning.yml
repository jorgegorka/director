key: campaign_planning
name: Campaign Planning
description: Produce a marketing campaign brief with objectives, audience, message, channels, timeline, and success metrics
category: creative
markdown: |
  # Campaign Planning

  ## Purpose
  Turn a marketing objective into a written campaign brief that other agents can execute. The brief names the goal in measurable terms, identifies the target audience, defines the core message, and maps it to channels, budget, and a timeline.

  ## When to use
  - A marketing goal has been assigned and you need to design the campaign that will achieve it
  - An existing campaign has underperformed and you are scoping a follow-up
  - A launch requires a coordinated marketing push across channels

  ## Approach
  1. Define the objective in measurable terms: leads, revenue, awareness lift, retention — one primary metric
  2. Characterize the target audience using existing analytics and docs via `search_documents`. Identify their motivations and objections at this stage of the journey
  3. Develop the core message and value proposition specific to this campaign — not generic brand messaging
  4. Select channels based on where the audience actually engages: paid, organic, email, content, partnerships
  5. Build the timeline: creative brief, asset production, launch, optimization window, wrap-up
  6. Set budget allocation and the metrics that will determine success or failure

  ## Guidelines
  - Every element must connect back to the primary objective. Cut anything that does not
  - Include an optimization window. Launch is the middle of the campaign, not the end
  - Coordinate with the teams that will handle inbound response so they are ready
  - Define post-campaign learnings capture so the next campaign benefits from this one

  ## Deliverable
  A campaign brief posted via `add_message`, containing: objectives and primary success metric, target audience profile, core message and creative brief, channel mix with rationale, timeline, budget, and a post-campaign review template. Spawn the first wave of execution tasks via `create_task`.
