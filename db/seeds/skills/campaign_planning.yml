key: campaign_planning
name: Campaign Planning
description: Design integrated marketing campaigns with clear goals, target audiences, messaging, and success metrics
category: creative
markdown: |
  # Campaign Planning

  ## Purpose
  Develop marketing campaigns that achieve specific business objectives by coordinating messaging, channels, timing, and budget into a coherent plan. This skill enables an agent to take a campaign brief from objective-setting through tactical execution planning, producing a document teams can act on immediately.

  ## Instructions
  1. Define campaign objectives in measurable terms: target leads, revenue, awareness lift, or retention rate
  2. Identify the target audience segment and their key motivations and objections at this stage of the journey
  3. Develop the core message and value proposition specific to this campaign
  4. Select channels (paid, organic, email, events, partnerships) based on where the audience spends time
  5. Build a campaign timeline with milestones: creative brief, asset production, launch, optimization, and wrap-up
  6. Set budget allocation across channels and define the metrics that determine campaign success or failure

  ## Guidelines
  - Every campaign element should connect back to the primary objective — cut anything that doesn't
  - Build in an optimization window — launching is only the beginning, not the end of the work
  - Coordinate with sales and customer success so they're ready to handle inbound generated by the campaign
  - Document learnings after each campaign to compound knowledge over time

  ## Output Format
  Campaign plan with: objectives and success metrics, target audience profile, core message and creative brief, channel mix with rationale, production and launch timeline, budget breakdown, and a post-campaign review template.
