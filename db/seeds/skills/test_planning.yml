key: test_planning
name: Test Planning
description: Define what will be tested, how, and when, allocating effort to the highest-risk areas before release
category: operations
markdown: |
  # Test Planning

  ## Purpose
  Produce a written test plan that names every feature to be verified, the test cases that cover it, and the entry and exit criteria for testing. The plan's job is to ensure nothing important ships untested, while also not burning time testing things that do not matter.

  ## When to use
  - A release, feature, or significant change is approaching and needs a verification plan
  - A task asks you to define quality gates for upcoming work
  - The existing test plan is stale and the release scope has changed

  ## Approach
  1. Read the requirements, design, and acceptance criteria. Write down what "tested" means for this scope
  2. Define scope: features in, features out, and the types of testing required (functional, regression, performance, security)
  3. Enumerate test cases for each feature: happy path, error paths, edge cases, boundary conditions
  4. Prioritize each test by risk and business impact. High-risk areas get the most coverage
  5. Define environment requirements: data setup, tools, credentials
  6. Set entry and exit criteria: when is testing ready to begin, and what must be true before the release can ship?

  ## Guidelines
  - Prioritize around complexity and risk, not newness — complex old code breaks as often as new code
  - Automate regression coverage; use focused manual or exploratory testing for new and risky areas
  - Exit criteria must be objective and measurable. "Feels ready" is not a criterion
  - Test plans that never get updated become ignored. Revise as scope changes

  ## Deliverable
  A test plan posted via `add_message`, containing: scope and objectives, test types, test case inventory (priority, scenario, expected result), environment requirements, effort estimate, entry and exit criteria, and sign-off conditions.
