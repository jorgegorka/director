key: technical_strategy
name: Technical Strategy
description: Define a multi-quarter technical roadmap that aligns engineering investments with business goals
category: technical
markdown: |
  # Technical Strategy

  ## Purpose
  Translate business strategy into a coherent technical direction: the platforms, tools, and capabilities the engineering organization must build, buy, keep, or retire. The output is a roadmap that answers "what are we going to work on, and what are we not going to work on" at a technical level.

  ## When to use
  - A new business strategy or goal changes what engineering must prioritize
  - Tech debt has reached a level where piecemeal fixes are no longer enough
  - A platform or framework decision has to be made that will affect multiple teams

  ## Approach
  1. Audit the current technical landscape: systems in use, tech debt hotspots, and where team expertise is concentrated. Use `search_documents` if relevant docs exist
  2. Read the business strategy and identify where technology is a differentiator versus a commodity
  3. Define 3–5 technical bets — areas where sustained investment will produce lasting advantage
  4. Decide the platform choices: what to standardize on, what to phase out, what to leave alone
  5. Sequence the roadmap. Identify the prerequisite work that unblocks later priorities
  6. Estimate resource and surface the trade-offs: if we do this, we cannot also do that

  ## Guidelines
  - Treat tech debt as a first-class strategic concern, not a background cleanup
  - Every major investment must tie back to a named business outcome. Investments with no outcome get cut
  - Be explicit about build vs. buy vs. integrate with decision criteria for each
  - Share the strategy with reportees so they can make better local decisions

  ## Deliverable
  A technical strategy document posted via `add_message`, containing: landscape audit, 3–5 strategic bets with rationale, platform decisions, sequenced roadmap with milestones, resource estimates, and the explicit trade-offs being accepted.
