key: ci_cd_pipelines
name: CI/CD Pipelines
description: Design and maintain automated build, test, and deployment pipelines that produce fast, trustworthy feedback
category: operations
markdown: |
  # CI/CD Pipelines

  ## Purpose
  Produce the pipeline design and configuration that verifies every change and deploys it reliably. A good pipeline fails loudly on real problems, runs fast enough to be used on every commit, and can be rolled back within minutes.

  ## When to use
  - A new project needs its build and deployment automation designed
  - Existing pipelines are slow, flaky, or missing important checks
  - A deployment strategy (canary, blue/green) needs to be introduced

  ## Approach
  1. Define the stages: source trigger, dependency install, build, unit tests, integration tests, security scans, artifact creation, deploy
  2. Configure each stage with appropriate parallelism, caching, and failure behavior. Fast feedback is the goal
  3. Choose a deployment strategy (blue/green, canary, rolling) appropriate to the risk profile of the service
  4. Instrument the pipeline itself: build duration trends, failure rate by stage, deployment frequency
  5. Design rollback: every deployment must be reversible within minutes
  6. Secure the pipeline: protect secrets, restrict deploy permissions, audit every production deploy

  ## Guidelines
  - A pipeline that takes 30+ minutes discourages frequent commits. Fast feedback is the primary goal
  - Test against an environment that mirrors production. Pipelines that test on reduced infrastructure miss important failures
  - Treat pipeline configuration as code. Review changes with the same rigor as application code
  - Measure deployment frequency and lead time. These are the primary health indicators

  ## Deliverable
  A pipeline document posted via `add_message` (plus committed config changes referenced by file path), containing: pipeline architecture, stage-by-stage configuration, deployment strategy, secrets management, rollback procedure, observability metrics, and current performance baselines.
