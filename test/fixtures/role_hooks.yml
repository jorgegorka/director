cto_validation_hook:
  role: cto
  project: acme
  lifecycle_event: after_task_complete
  action_type: 0  # trigger_agent
  action_config:
    target_role_id: <%= ActiveRecord::FixtureSet.identify(:developer) %>
    prompt: "Review the completed work for correctness and quality."
  enabled: true
  position: 0
  name: Validation by Developer

cto_webhook_hook:
  role: cto
  project: acme
  lifecycle_event: after_task_start
  action_type: 1  # webhook
  action_config:
    url: "https://hooks.example.com/task-started"
    headers:
      Authorization: "Bearer test-token"
  enabled: true
  position: 0
  name: Task Start Notification

disabled_hook:
  role: developer
  project: acme
  lifecycle_event: after_task_complete
  action_type: 0  # trigger_agent
  action_config:
    target_role_id: <%= ActiveRecord::FixtureSet.identify(:cto) %>
  enabled: false
  position: 0

cto_start_validation_hook:
  role: cto
  project: acme
  lifecycle_event: after_task_start
  action_type: 0  # trigger_agent
  action_config:
    target_role_id: <%= ActiveRecord::FixtureSet.identify(:developer) %>
    prompt: "Review the task requirements before work begins."
  enabled: true
  position: 1
  name: Start Validation
