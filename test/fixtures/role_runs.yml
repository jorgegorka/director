queued_run:
  role: cto
  task: design_homepage
  company: acme
  status: 0  # queued
  trigger_type: task_assigned

running_run:
  role: developer
  task: fix_login_bug
  company: acme
  status: 1  # running
  trigger_type: task_assigned
  started_at: <%= 5.minutes.ago.to_fs(:db) %>

completed_run:
  role: cto
  task: completed_task
  company: acme
  status: 2  # completed
  trigger_type: scheduled
  started_at: <%= 1.hour.ago.to_fs(:db) %>
  completed_at: <%= 30.minutes.ago.to_fs(:db) %>
  exit_code: 0
  cost_cents: 1200
  claude_session_id: "sess_abc123"
  log_output: "Task completed successfully"

failed_run:
  role: developer
  task: design_homepage
  company: acme
  status: 3  # failed
  trigger_type: task_assigned
  started_at: <%= 2.hours.ago.to_fs(:db) %>
  completed_at: <%= 2.hours.ago.to_fs(:db) %>
  error_message: "Connection refused"
  exit_code: 1
