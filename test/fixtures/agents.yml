claude_agent:
  name: Claude Assistant
  company: acme
  adapter_type: 2  # claude_local
  status: 0        # idle
  adapter_config: '{"model": "claude-sonnet-4-20250514"}'
  description: "Primary AI development assistant"

http_agent:
  name: API Bot
  company: acme
  adapter_type: 0  # http
  status: 0        # idle
  adapter_config: '{"url": "https://api.example.com/agent", "method": "POST"}'
  description: "Cloud-hosted agent for data processing"

process_agent:
  name: Script Runner
  company: acme
  adapter_type: 1  # process
  status: 2        # paused
  adapter_config: '{"command": "/usr/local/bin/my-agent.sh"}'
  pause_reason: "Maintenance window"

widgets_agent:
  name: Widget Bot
  company: widgets
  adapter_type: 0  # http
  status: 0        # idle
  adapter_config: '{"url": "https://widgets.example.com/bot"}'
