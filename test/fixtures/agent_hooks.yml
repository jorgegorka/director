claude_validation_hook:
  agent: claude_agent
  company: acme
  lifecycle_event: after_task_complete
  action_type: 0  # trigger_agent
  action_config:
    target_agent_id: <%= ActiveRecord::FixtureSet.identify(:http_agent) %>
    prompt: "Review the completed work for correctness and quality."
  enabled: true
  position: 0
  name: Validation by API Bot

claude_webhook_hook:
  agent: claude_agent
  company: acme
  lifecycle_event: after_task_start
  action_type: 1  # webhook
  action_config:
    url: "https://hooks.example.com/task-started"
    headers:
      Authorization: "Bearer test-token"
  enabled: true
  position: 0
  name: Task Start Notification

disabled_hook:
  agent: http_agent
  company: acme
  lifecycle_event: after_task_complete
  action_type: 0  # trigger_agent
  action_config:
    target_agent_id: <%= ActiveRecord::FixtureSet.identify(:claude_agent) %>
  enabled: false
  position: 0

claude_start_validation_hook:
  agent: claude_agent
  company: acme
  lifecycle_event: after_task_start
  action_type: 0  # trigger_agent
  action_config:
    target_agent_id: <%= ActiveRecord::FixtureSet.identify(:http_agent) %>
    prompt: "Review the task requirements before work begins."
  enabled: true
  position: 1
  name: Start Validation
