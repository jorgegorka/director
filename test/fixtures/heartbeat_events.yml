scheduled_heartbeat:
  agent: claude_agent
  trigger_type: 0         # scheduled
  status: 1               # delivered
  trigger_source: "schedule"
  created_at: <%= 1.hour.ago.to_fs(:db) %>
  delivered_at: <%= 1.hour.ago.to_fs(:db) %>
  request_payload:
    trigger: scheduled
    agent_id: 1
  response_payload:
    status: ok
  metadata: {}

task_assigned_event:
  agent: http_agent
  trigger_type: 1         # task_assigned
  status: 1               # delivered
  trigger_source: "Task#1"
  delivered_at: <%= 30.minutes.ago.to_fs(:db) %>
  request_payload:
    trigger: task_assigned
    task_id: 1
  response_payload:
    acknowledged: true
  metadata: {}

queued_event:
  agent: process_agent
  trigger_type: 1         # task_assigned
  status: 0               # queued
  trigger_source: "Task#2"
  request_payload:
    trigger: task_assigned
    task_id: 2
  response_payload: {}
  metadata: {}

failed_event:
  agent: http_agent
  trigger_type: 0         # scheduled
  status: 2               # failed
  trigger_source: "schedule"
  request_payload:
    trigger: scheduled
  response_payload: {}
  metadata:
    error: "Connection refused"

mention_event:
  agent: claude_agent
  trigger_type: 2         # mention
  status: 1               # delivered
  trigger_source: "Message#1"
  created_at: <%= 15.minutes.ago.to_fs(:db) %>
  delivered_at: <%= 15.minutes.ago.to_fs(:db) %>
  request_payload:
    trigger: mention
    message_id: 1
  response_payload:
    status: ok
  metadata: {}
